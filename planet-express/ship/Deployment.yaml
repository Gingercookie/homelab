# manifests/ship-service-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ship-service
  namespace: planet-express
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ship-service
  template:
    metadata:
      labels:
        app: ship-service
    spec:
      containers:
        - name: ship-service
          image: wilgrimthepilgrim/ship:latest
          env:
            - name: LOG_LEVEL
              value: "INFO"
          ports:
            - containerPort: 8080
            - containerPort: 2112
              name: metrics
          imagePullPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: ship-service
  namespace: planet-express
  labels:
    app: ship-service
spec:
  selector:
    app: ship-service
  ports:
    - port: 80
      targetPort: 8080
      name: http
    - port: 2112
      name: metrics
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: ship-service
  namespace: planet-express
spec:
  selector:
    matchLabels:
      app: ship-service
  endpoints:
    - port: metrics
